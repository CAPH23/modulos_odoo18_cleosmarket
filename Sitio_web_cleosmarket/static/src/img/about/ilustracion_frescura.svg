<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" role="img" aria-label="Persona sembrando una planta, símbolo de frescura y comunidad">
  <defs>
    <filter id="sombraSuave2" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2a5e" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="blobGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe6b0"/>
      <stop offset="1" stop-color="#ffd98f"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <ellipse cx="380" cy="390" rx="350" ry="300" fill="url(#blobGrad2)" opacity="0.85"/>
  <ellipse cx="380" cy="400" rx="280" ry="240" fill="#ffefc9" opacity="0.6"/>

  <!-- Plantas de fondo -->
  <g opacity="0.7">
    <path d="M132 470 q-6 -70 24 -104 q6 56 -4 104 z" fill="#6fbf73"/>
    <path d="M150 472 q18 -64 56 -78 q-12 56 -40 80 z" fill="#4f9d4f"/>
    <path d="M626 500 q-4 -64 22 -96 q6 52 -4 96 z" fill="#6fbf73"/>
    <path d="M608 502 q-18 -58 -52 -72 q10 52 36 74 z" fill="#4f9d4f"/>
  </g>

  <!-- ===================== PERSONA ===================== -->
  <g filter="url(#sombraSuave2)">
    <!-- pierna arrodillada (asoma a la derecha) -->
    <path d="M470 560 q70 -10 96 26 q10 16 -6 24 q-58 18 -100 2 z" fill="#3f63a0"/>
    <path d="M548 598 q36 -8 58 6 q12 8 0 16 l-54 4 q-14 -2 -4 -26 z" fill="#1f2a5e"/>
    <path d="M548 618 l58 -4 q8 4 -2 8 l-52 4 q-10 -2 -4 -8 z" fill="#f6f1e6"/>
    <!-- torso: camiseta amarilla -->
    <path d="M364 560 q-16 -160 88 -172 q96 -10 104 96 l6 76 z" fill="#f5b91d"/>
    <!-- peto de mezclilla -->
    <path d="M398 560 q-8 -96 56 -110 l8 110 z" fill="#3f63a0"/>
    <path d="M462 450 l44 -6 l6 116 l-50 0 z" fill="#4a73ad"/>
    <path d="M436 392 l10 70 m70 -78 l4 74" stroke="#3f63a0" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="486" cy="498" r="8" fill="#ffc845"/>
    <!-- cabeza -->
    <circle cx="452" cy="312" r="46" fill="#f3c39d"/>
    <path d="M406 308 q-6 -62 46 -68 q54 -6 50 60 q-2 24 -10 12 q-8 -34 -42 -34 q-32 0 -36 32 q-4 14 -8 -2 z" fill="#5d3a26"/>
    <path d="M406 304 q-16 60 4 110 q-28 -12 -24 -62 q2 -34 20 -48 z" fill="#5d3a26"/>
    <path d="M498 304 q14 50 -2 96 q24 -10 22 -56 q-2 -28 -20 -40 z" fill="#5d3a26"/>
    <circle cx="438" cy="314" r="5" fill="#3a2a20"/>
    <circle cx="468" cy="314" r="5" fill="#3a2a20"/>
    <path d="M442 338 q11 10 22 0" stroke="#3a2a20" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="426" cy="330" r="7" fill="#f0a884" opacity="0.6"/>
    <circle cx="480" cy="330" r="7" fill="#f0a884" opacity="0.6"/>
    <!-- brazo de apoyo -->
    <path d="M520 444 q34 36 40 84 l-26 8 q-14 -44 -40 -72 z" fill="#f5b91d"/>
    <circle cx="546" cy="540" r="15" fill="#f3c39d"/>
  </g>

  <!-- ===================== MACETA Y PLANTA ===================== -->
  <g filter="url(#sombraSuave2)">
    <!-- planta -->
    <path d="M268 478 q-2 -82 4 -120" stroke="#3f8f47" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M270 414 q-44 -18 -56 -58 q48 6 56 58 z" fill="#4f9d4f"/>
    <path d="M272 380 q40 -26 44 -68 q-46 14 -44 68 z" fill="#6fbf73"/>
    <path d="M270 442 q-36 -10 -48 -42 q40 4 48 42 z" fill="#6fbf73"/>
    <path d="M272 446 q34 -16 40 -52 q-40 10 -40 52 z" fill="#3f8f47"/>
    <!-- tierra -->
    <ellipse cx="270" cy="492" rx="92" ry="22" fill="#5a3d2b"/>
    <!-- maceta -->
    <path d="M178 496 L362 496 L334 634 L206 634 Z" fill="#c96f4a"/>
    <path d="M178 496 L362 496 L356 526 L184 526 Z" fill="#b65f3e"/>
    <rect x="170" y="482" width="200" height="30" rx="14" fill="#d07a52"/>
    <path d="M206 540 q60 18 120 0 l-4 22 q-56 16 -112 0 z" fill="#b65f3e" opacity="0.6"/>
  </g>

  <!-- Brazo por delante, alcanzando la tierra de la maceta -->
  <g filter="url(#sombraSuave2)">
    <path d="M398 432 q-52 16 -84 44 l16 24 q38 -28 80 -40 z" fill="#f5b91d"/>
    <circle cx="318" cy="488" r="16" fill="#f3c39d"/>
  </g>

  <!-- ===================== PRODUCTOS FRESCOS ===================== -->
  <g filter="url(#sombraSuave2)">
    <!-- tomate -->
    <circle cx="120" cy="610" r="36" fill="#dd3d34"/>
    <path d="M120 578 l-10 -12 m10 12 l0 -16 m0 16 l10 -12" stroke="#3f8f47" stroke-width="6" stroke-linecap="round"/>
    <ellipse cx="108" cy="598" rx="9" ry="6" fill="#ffffff" opacity="0.35"/>
    <!-- pimiento amarillo con lóbulos -->
    <g>
      <path d="M598 580 q-14 8 -14 34 q0 36 22 44 q-30 -2 -32 -42 q-2 -30 24 -36 z" fill="#e0ad1c"/>
      <ellipse cx="616" cy="616" rx="22" ry="40" fill="#f5c531"/>
      <ellipse cx="640" cy="618" rx="20" ry="38" fill="#eab825"/>
      <ellipse cx="600" cy="618" rx="18" ry="36" fill="#ffd95e"/>
      <path d="M618 578 q0 -16 12 -22" stroke="#3f8f47" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M626 556 q12 -6 22 2 q-10 8 -22 4 z" fill="#4f9d4f"/>
    </g>
    <!-- zanahoria -->
    <path d="M664 520 q28 24 44 56 q-30 0 -56 -38 q6 -12 12 -18 z" fill="#f08c2e"/>
    <path d="M660 516 q-16 -10 -28 -6 q8 -12 22 -10 q-2 -12 6 -18 q4 10 8 16 q10 -8 20 -6 q-8 10 -16 14 z" fill="#4f9d4f"/>
  </g>

  <!-- sombra del piso -->
  <ellipse cx="380" cy="668" rx="260" ry="22" fill="#1f2a5e" opacity="0.10"/>

  <!-- chispas -->
  <g fill="#f6a51d">
    <circle cx="140" cy="200" r="6"/>
    <circle cx="640" cy="180" r="7"/>
    <path d="M600 320 l6 14 l14 6 l-14 6 l-6 14 l-6 -14 l-14 -6 l14 -6 z"/>
    <path d="M180 120 l5 12 l12 5 l-12 5 l-5 12 l-5 -12 l-12 -5 l12 -5 z"/>
  </g>
</svg>
