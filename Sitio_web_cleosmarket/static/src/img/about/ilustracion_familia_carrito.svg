      <line x1="424" y1="448" x2="432" y2="590"/>
      <line x1="476" y1="448" x2="480" y2="590"/>
      <line x1="528" y1="448" x2="526" y2="590"/>
      <line x1="580" y1="448" x2="572" y2="590"/>
